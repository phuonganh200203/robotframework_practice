    welcome_modal:
      title: Unsere Tipps für ein optimales Fotoergebnis
      content: |
        <ul class="instroduce-content">
          <li>Ihr Auto sollte sauber und trocken sein</li>
          <li>Achte auf gute Lichtverhältnisse: <br/>Tageslicht, kein Blitz und ohne direkte Sonneneinstrahlung fotografieren – so kann eigentlich schon nix mehr schief gehen 😉</li>
        </ul>
    help_modal:
      vin_number:
        title: "Was bedeutet FIN-Nummer und wo finde ich diese?"
        content: |
          <p>Die Fahrzeug-Identifizierungsnummer ist ein eindeutiger Code, der jedem Fahrzeug bei der Herstellung zugeteilt wird. Die FIN-Nummer ist eine 17-stellige Kombination aus Buchstaben und Zahlen.</p>
          <h4>Die FIN-Nummer befinden sich fahrzeugspezifisch an folgenden Stellen:</h4>
          <h5>In der Zulassung</h5>
          <div class="image vin_number_0"></div>
          <h5>sowie am Fahrzeug</h5>
          <div class="image vin_number_1"></div>
          <h5>1. an der Windschutzscheibe in Fahrtrichtung links</h5>
          <div class="image vin_number_2"></div>
          <h5>2. an den linken und rechten Türrahmen</h5>
          <div class="image vin_number_3"></div>
          <h5>3. Im Motorraum</h5>
          <div class="image vin_number_4"></div>
      vehicle_registration:
        title: "Bitte fotografieren Sie Ihren Fahrzeugschein wie abgebildet"
        content: |
          <div class="image vehicle_registration_0"></div>
