en:
  defaults:
    mailer:
      greeting: "Dear Mr / Ms %{claimant_lastname},"
      sincerely_yours: Sincerely,
      mcall_insurance: Your MotionsCall Versicherung AG
      mcall_ag: MotionsCall Versicherung AG
      mcall_address: Adenauerring 7, 81737 Munich
      telephone: "Telephone: (089) 5121-0"
      fax: "Telefax: (089) 5121-1000"
      email: "E-mail: service.de@motionscall.com"
      de_email: "E-mail (DE): service@motionscall.de-mail.de"
      website: "Website: www.motionscall.de"
      chairman_of_supervisory_board: "Chairman of the board: Antonio Cangeri"
      director: "Executive Board: Giovanni Liverani (Chairman), Bernd Felske, Stefan Lehmann, Milan Novotný, Dr. Rainer Sommer, Dr. Robert Wehn"
      mcall_group: MotionsCall Insurance is part of the MotionsCall Group.
      footer: This message contains confidential information and is exclusively for the person addressed or their representative. If you are not the intended recipient of this message and its contents, please notify the sender immediately. Any form of unauthorised use, publication, reproduction, copying or disclosure of the content of the e-mail is not permitted.
  claim_mailer:
    uploaded_documentation_to_insurer:
      subject: "Document uploaded: Claim %{claim_number}"
      body: |
        <p>Hi there!</p>
        <p>The User has provided new documents for the claim number %{claim_number}.</p>
    photo_upload_notification:
      subject: "Document uploaded: Claim %{claim_number}"
      body: |
        <p>Hi there!</p>
        <p>The User has provided new documents for the claim number %{claim_number}.</p>
    ar_photo_upload_notification:
      subject: "Document uploaded: Claim %{claim_number}"
      body: |
        <p>Hi there!</p>
        <p>The User has provided new documents for the claim number %{claim_number}.</p>
    new_claim_to_insurer:
      subject: "New claim %{claim_number}"
      body: |
        <p>Dear Sir or Madam,</p>
        <p>A claim was created for the object %{object_name} on %{created_date}.</p>
        <p>Your %{insurer_name}</p>
    accepted_cash_settlement_email:
      subject: "Accepted Cash Settlement %{claim_number}"
      body: |
        <p>Hello %{adjuster_name},</p>
        <p>%{claimant_name} has approved your proposal for the case %{claim_number}.</p>
    rejected_cash_settlement_email:
      subject: "Rejected Cash Settlement %{claim_number}"
      body: |
        <p>Hello %{adjuster_name},</p>
        <p>%{claimant_name} has rejected your proposal for the case %{claim_number}.</p>
    cash_settlement_to_claimant:
      subject: Cash Settlement
      body: Dear Madam/ Sir %{claimant_name}, please click on the <a href="%{cash_settlement_url}">link</a> for your new status.
    video_appointment:
      subject: "%{claim_number}: Live Video Inspection Appointment"
      body: |
        <p>Dear Mr / Ms %{claimant_name},</p>
        <p>%{insurer_name} claim %{claim_number}</p>
        <p>You set an appointment for a live video inspection that will begin on %{appointment_date} at %{appointment_time}<br/>At the appointment date at time, please click the below to launch the live video inspection:</p>
        <p><a href="%{appointment_url}">%{insurer_name} CLAIM VIDEO INSPECTION</a></p>
        <p>Sincerely,</p>
        <p>%{insurer_name} Smart Bot</p>
        <img width="150" src="%{logo_url}">
    video_appointment_adjuster:
      subject: "%{claim_number}: Live Video Inspection Appointment"
      body: |
        <p>Dear Mr / Ms %{adjuster_name},</p>
        <p>%{insurer_name} claim %{claim_number}</p>
        <p>You set an appointment for a live video inspection that will begin on %{appointment_date} at %{appointment_time}<br/>At the appointment date at time, please click the below to launch the live video inspection:</p>
        <p><a href="%{appointment_url}">%{insurer_name} CLAIM VIDEO INSPECTION</a></p>
        <p>Sincerely,</p>
        <p>%{insurer_name} Smart Bot</p>
        <img width="150" src="%{logo_url}">
    video_appointment_reminder:
      subject: "Video Appointment Reminder Email"
      body: |
        <p>%{insurer_name} claim %{claim_number}: Appointment for live video inspection in %{reminder} mins. Click the link to start: <a href='%{url}'>%{url}</a></p>
    appointment:
      subject: "Video call case- %{claim_number}"
      body: |
        <p>Dear Mr / Ms %{claimant_lastname},</p>
        <p>Mr / Ms %{adjuster_name} (the claims adjuster) invites you to a video call with MotionsCall Versicherung AG.</p>
        <p>Before we can start we ask you to read and accept the following terms and conditions:</p>
        <p>By starting the video call, you also accept that your own volume will be used for the call.</p>
        <p>Please click the following %{video_call_link} to start the video call.</p>
        <br>
        <p>Sincerely,</p>
        <p>Your MotionsCall Versicherung AG</p>
        <img width="150" src="%{logo_url}">
        <p>MotionsCall Versicherung AG</p>
        <p>Adenauerring 7, 81737 Munich</p>
        <p>Telephone: (089) 5121-0</p>
        <p>Telefax: (089) 5121-1000</p>
        <p>E-Mail: service.de@motionscall.com</p>
        <p>DE-Mail: service@motionscall.de-mail.de</p>
        <p>Website: www.motionscall.de</p>
        <p>Chairman of the board: Antonio Cangeri</p>
        <p>Executive Board: Giovanni Liverani (Chairman), Bernd Felske, Stefan Lehmann, Milan Novotný, Dr. Rainer Sommer, Dr. Robert Wehn</p>
        <p>MotionsCall Insurance is part of the MotionsCall Group.</p>
        <br>
        <p>This message contains confidential information and is exclusively for the person addressed or their representative. If you are not the intended recipient of this message and its contents, please notify the sender immediately. Any form of unauthorised use, publication, reproduction, copying or disclosure of the content of the e-mail is not permitted.</p>
    notify:
    claim_report_summary:
      subject: "Damage %{claim_number} from %{sent_at}"
      body: |
        <p> Dear, </p>
        <p> Please review damage %{claim_number} in the attachment. </p>
        <p> Sincerely, </p>
        <p>%{insurer_name} Smart Bot </p>
    claim_report_summary_to_claimant:
      subject: "Damage %{claim_number} from %{sent_at}"
      body: |
        <p>Guten Tag,</p>
        <p>Anbei erhalten Sie die Kopie der ausgefüllten Schadenmeldung zum AVIS-Kennzeichen: %{registration_number} für Ihre Unterlagen.
        <p>Mit freundlichen Grüßen,</p>
        <p>MotionsCloud GmbH</p>
  insured_building_mailer:
    new_insured_building_to_insurer:
      subject: "New object %{object_name}"
      body: |
        <p>Dear Sir or Madam,</p>
        <p>
          The user %{adjuster_name} created a new object:<br/>
          %{object_name}
        </p>
        <br/>
  snapshot_mailer:
    with_pdf_attachment:
      attachment_filename: "%{claim_number}- Photos from the video call.pdf"
      subject: "%{claim_number}: Photos from the video call"
      greeting: "Dear %{adjuster_name},"
      body: "Please review the photos of %{claim_number} in the attachment."
  user_mailer:
    registration:
      set_your_password: Create your password
      subject: MotionsCall-MotionsCloud platform registration
      body: |
        <p>Dear Mr / Ms %{user_name},</p>
        <p>Your e-mail was registered on our MotionsCall video inspection platform. Please click on the following link to generate your password.</p>
        <p>%{set_new_password_url}</p>
        <p>Then you will be redirected to the login of the MotionsCall video inspection platform. Please use your e-mail address as your username.</p>
        <p>Sincerely,</p>
        <p>MotionsCloud Smart Bot</p>
    reset_password_instructions:
      set_new_password: Change your password
      user_subject: Reset Password Instructions
      body: |
        <p>Dear Sir or Madam %{user_name}!</p>
        <p>Someone has requested a link to change your password. You can do this through the link below</p>
        <p>%{set_new_password_url}</p>
        <p>If you didn't request this, please ignore this email.</p>
        <p>Your password won't change until you access the link above and create a new one.</p>
        <br />
        <p>Sincerely,</p>
        <p>MotionsCloud Smart Bot</p>
  picture_app_mailer:
    subject: "Notification from the %{insurer_name} team"
    body: |
      <p>Dear Sir or Madam, please click on the link and upload the required photos of your case.</p>
      <p>%{picture_app_url}</p>
      <p>Sincerely, the%{insurer_name} Team</p>
  claim_status_mailer:
    subject: "Notification from the %{insurer_name} Team"
    body: |
      <p>Dear Sir or Madam.</p>
      <p>We have an update of your status case number %{claim_number}</p>
      <p>%{url}</p>
      <p>Details: %{details}</p>
      <p> Sincerely, The %{insurer_name} Team </p>
  claim_assignment_mailer:
    subject: "New assignment for the case %{claim_number}"
    body: |
      <p>You have been assigned the case %{claim_number} for an expert opinion.</p>
      <p>You can find details under the following %{claim_link}</p>
      <br />
      <p>Best regards,</p>
      <p>%{insurer_name}</p>
  klickmal_mailer:
    case_report_summary:
      subject: "MotionsCloud Review Report: Car AI Inspection - %{case_number} from %{sent_at}"
      body: |
        <p> Dear, </p>
        <p> Please review case number / application number %{case_number} in the attachment. </p>
        <p> Sincerely, </p>
        <p>%{insurer_name} Smart Bot </p>
        <p>%{sent_at} </p>
  two_factor_authentication_emailer:
    verification_code_email:
      subject: "Notification from the %{insurer_name} team"
      body: "%{verification_code} is your MCS Verification Code for sign in. This code is valid in 5 minutes."
