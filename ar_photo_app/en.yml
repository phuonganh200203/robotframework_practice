      term_conditions:
        title: Geschäftsbedingungen
        content: |
          <p>AGB’s VORSCHADENDOKUMENATION</p>
          <p>Nutzungsbedingungen zu dem Programm „Pictureapp“ der Generali Deutschland AG (Generali Deutschland AG, Adenauerring 7, 81737 München, Deutschland) Um dieses Programm nutzen zu können, müssen Sie diesen Nutzungsbedingungen zustimmen.</p>
          <p class="block">§ 1 Anwendungsbereich</p>
          <p>Eine Nutzung des von der Generali Deutschland AG (Generali Deutschland AG), ("Generali") angebotenen Programms „Pictureapp“, (im Folgenden: "Programm") ist ausschließlich aufgrund dieser Bedingungen zulässig. Mit Betätigung des Links in der Ihnen zugesandten SMS oder E-Mail wird die Geltung dieser Nutzungsbedingungen in ihrer jeweiligen Fassung akzeptiert.</p>
          <p class="block">§ 2 Vertragsgegenstand</p>
          <p>(1) Das Programm wird über WEB-Dienste gestartet.</p>
          <p>(2) Generali ist berechtigt, jederzeit den Betrieb des Programms ganz oder teilweise einzustellen. Aufgrund der Beschaffenheit des Internets, der Mobilfunknetze und der Computersysteme übernimmt Generali keine Gewähr für die ununterbrochene Verfügbarkeit oder Funktionstauglichkeit des Programms.</p>
          <p>(3) Diese Nutzungsbedingungen regeln einzig die Verwendung des Programms.</p>
          <p>(4) Das Programm ermöglicht Ihnen die Durchführung der Bilderaufnahme und Bilderzusendung sowie eine Funktion zur Übersendung des aktuellen Status Ihres Falles zum Zwecke der Fallbearbeitung. Während der Nutzung können Sie Bilder über Ihr Smartphone oder Tablet neu aufnehmen oder über Ihre Galerie übertragen. Diese Bilder werden für Ihren Auftrag genutzt. Zu diesen Zwecken verarbeitet Generali auch personenbezogene Daten.</p>
          <p class="block">§ 3 Technische Anforderungen an Mobilgeräte zur Nutzung des Programms</p>
          <p>Voraussetzung zur Nutzung des Programms ist, dass eine Internetverbindung besteht. Die Höhe ggfs. für die Nutzung anfallender Kosten richtet sich nach den diesbezüglichen Bestimmungen des Mobilfunktarifs des Nutzers. Die Nutzung einer Internetverbindung über ein örtliches Funknetzwerk kann kostenpflichtig sein.</p>
          <p class="block">§ 4 Zugang</p>
          <p>(1) Generali ist jederzeit berechtigt, die Zugangsberechtigung zu widerrufen, ohne dass es der Angabe von Gründen bedarf. Dies gilt insbesondere, wenn Sie gegen diese Bedingungen oder gegen anwendbares Recht bei Nutzung des Programms verstoßen haben.</p>
          <p>(2) Die Zugangsberechtigung erlischt mit Beendigung des Programms.</p>
          <p class="block">§ 5 Funktionalitäten des Programms</p>
          <p>Nach erfolgter Aktivierung des Programms können Sie mittels Ihrer Smartphone- Kamera den aktuellen Zustand Ihres Fahrzeuges präsentieren, ermöglicht durch die Bilderaufnahme und Bilderzusendung sowie einer Funktion zur Übersendung des aktuellen Status Ihres Falles zum Zwecke der Fallbearbeitung. Während der Nutzung können Sie Bilder über Ihr Smartphone oder Tablet neu aufnehmen oder über Ihre Galerie übertragen. Diese Bilder werden für Ihren Auftrag genutzt. Zu diesen Zwecken verarbeitet Generali auch personenbezogene Daten.</p>
          <p class="block">§ 6 Ihre Pflichten</p>
          <p>Sie dürfen bei Nutzung des Programms nicht Inhalte mit Viren, sog. Trojanischen Pferden oder sonstige Programmierungen, die Software beschädigen können, übermitteln.</p>
          <p class="block">§ 7 Nutzungsdauer</p>
          <p>(1) Die Laufzeit dieser Vereinbarung über die Nutzung des Programms beginnt mit Zustimmung zu diesen Nutzungsbedingungen und endet mit der Beendigung des Programms.</p>
          <p>(2) Das Recht zur außerordentlichen Kündigung dieser Nutzungsvereinbarung aus wichtigem Grund bleibt unberührt.</p>
          <p class="block">§ 8 Sonstige Haftung und Schadenersatz</p>
          <p>(1) Generali haftet nur nach Maßgabe der folgenden Bestimmungen in (a) bis (c):</p>
          <p>(a) Generali haftet unbeschränkt für vorsätzlich oder grob fahrlässig durch Generali, ihre gesetzlichen Vertreter oder Erfüllungsgehilfen verursachten Schäden.</p>
          <p>(b) Generali haftet unbeschränkt für vorsätzlich oder fahrlässig verursachte Schäden aus der Verletzung des Lebens, des Körpers oder der Gesundheit durch die Generali, ihre gesetzlichen Vertreter oder Erfüllungsgehilfen.</p>
          <p>(c) Generali haftet für Schäden aus der Verletzung von Kardinalpflichten durch Generali, ihre gesetzlichen Vertreter oder Erfüllungsgehilfen; Kardinalpflichten sind die wesentlichen Pflichten, die die Grundlage des Vertrags bilden, die entscheidend für den Abschluss des Vertrags waren und auf deren Erfüllung der Nutzer vertrauen durfte. Wenn Generali diese Kardinalpflichten leicht fahrlässig verletzt hat, ist ihre Haftung auf den Betrag begrenzt, der für Generali zum Zeitpunkt der jeweiligen Leistung vorhersehbar war.</p>
          <p>(2) Eine weitere Haftung von Generali ist dem Grunde nach ausgeschlossen.</p>
          <p>(3) Eine Änderung der Beweislast zu Ihrem Nachteil ist mit der vorstehenden Regelung nicht verbunden.</p>
          <p class="block">§ 9 Hinweise zur Datenverarbeitung</p>
          <p>9.1 Art der persönlichen Daten Folgende Daten werden von Generali gespeichert: Antragsnummer, Nachname, Vorname, Mail, Telefonnummer mobil, FIN Nummer, Automodell, Baujahr, Automarke, Leistung, Einheit (KW/PS) sowie Ihre GPS-Geokodierung zum Zeitpunkt der Verwendung des Programms.</p>
          <p>9.2 Speicherort/Löschung der Daten Generali speichert Ihre personenbezogenen Daten nur so lange, wie sie zum Erreichen des Zwecks, für den sie erhoben wurden, erforderlich sind und keine sonstigen gesetzlichen oder vertraglichen Erfordernisse (wie z.B. Aufbewahrungsfristen) für eine längere Speicherung bestehen.</p>
          <p>9.3 Zweckgebundene Verwendung Generali wird die von Ihnen zur Verfügung gestellten personenbezogenen Daten nur für zum Zwecke der Fallbearbeitung verarbeiten. Sollten personenbezogene Daten über die gesetzlichen Verarbeitungsmöglichkeiten hinaus verarbeitet werden, wird dies nur mit Ihrer ausdrücklichen Einwilligung erfolgen. Verarbeitungen von personenbezogenen Daten sowie deren Übermittlung an auskunftsberechtigte staatliche Institutionen und Behörden erfolgen nur im Rahmen der einschlägigen Gesetze bzw. sofern wir durch eine gerichtliche Entscheidung dazu verpflichtet sind. Die MitarbeiterInnen von Generali und die von diesem beauftragten Dienstleistungsunternehmen sind zur Verschwiegenheit und zur Einhaltung des europäischen sowie nationalen Datenschutzstandards verpflichtet.</p>
          <p>9.4. Sicherheit Generali hat technische und organisatorische Sicherheitsmaßnahmen getroffen, um Ihre personenbezogenen Daten vor Verlust, Zerstörung, Manipulation und unberechtigten Zugriff zu schützen. Alle MitarbeiterInnen von Generali sind auf die Einhaltung des europäischen sowie nationalen Datenschutzstandards und den vertraulichen Umgang mit personenbezogenen Daten verpflichtet. Im Falle der Erhebung und Verarbeitung persönlicher Daten werden die Informationen in SSL-verschlüsselter Form übertragen, um einem Missbrauch der Daten durch Dritte vorzubeugen. Die Sicherungsmaßnahmen von Generali werden entsprechend der technologischen Entwicklung fortlaufend überarbeitet.</p>
          <p>9.5 Ihre Rechte als Betroffener Werden personenbezogene Daten von Ihnen verarbeitet, sind Sie Betroffener i.S.d. DSGVO und es stehen Ihnen folgende Rechte gegenüber der Generali zu:</p>
          <p>a) Auskunftsrecht Sie können gegenüber Generali jederzeit Ihr Auskunftsrecht nach Art. 15 DSGVO wahrnehmen, ob und welche Sie betreffende personenbezogene Daten durch Generali verarbeitet werden.</p>
          <p>b) Recht auf Berichtigung Sie können gegenüber Generali jederzeit Ihr Berichtigungsrecht nach Art. 16 DSGVO wahrnehmen, und die Berichtigung Sie betreffender unrichtiger personenbezogener Daten verlangen.</p>
          <p>c) Recht auf Einschränkung der Verarbeitung Sie können gegenüber Generali jederzeit Ihr Recht auf Einschränkung der Verarbeitung nach Art. 18 DSGVO wahrnehmen, und die Einschränkung der Verarbeitung zu verlangen, sofern die gesetzlichen Voraussetzungen hierfür vorliegen.</p>
          <p>d) Recht auf Löschung Sie können gegenüber Generali jederzeit Ihr Löschungsrecht nach Art. 17 DSGVO wahrnehmen, und verlangen, dass Sie betreffende personenbezogene Daten unverzüglich gelöscht werden, wenn diese Daten für die Zwecke, für die sie erhoben oder auf sonstige Weise verarbeitet wurden, nicht mehr notwendig sind. Dies gilt nicht, soweit die Generali steuer- und handelsrechtlichen Vorschriften über die Speicherung von derartigen Daten unterliegen. Die Daten werden dann nicht gelöscht, jedoch nur noch für die Zwecke der Speicherung aufbewahrt.</p>
          <p>e) Recht auf Unterrichtung Sie können gegenüber Generali jederzeit Ihr Recht auf Unterrichtung nach Art. 19 DSGVO wahrnehmen. Haben Sie ein Recht auf Berichtigung, Löschung oder Einschränkung der Verarbeitung gegenüber Generali geltend gemacht, ist Generali verpflichtet, allen Empfängern, denen die Sie betreffenden personenbezogenen Daten offengelegt wurden, diese Berichtigung oder Löschung der Daten oder Einschränkung der Verarbeitung mitzuteilen, es sei denn, dies erweist sich als unmöglich oder ist mit einem unverhältnismäßigen Aufwand verbunden. Ihnen steht das Recht zu, über diese Empfänger unterrichtet zu werden.</p>
          <p>f) Recht auf Datenübertragbarkeit Sie können gegenüber Generali jederzeit Ihr Recht auf Datenübertragbarkeit gemäß Art. 20 DSGVO wahrnehmen. Sie haben das Recht, Ihre personenbezogenen Daten, die Sie der Generali bereitgestellt haben, in einem strukturierten, gängigen und maschinenlesebaren Format zu erhalten oder die Übermittlung an einen anderen Verantwortlichen zu verlangen, soweit dies technisch machbar ist.</p>
          <p>g) Widerspruchsrecht Sie haben das Recht, aus Gründen, die sich aus ihrer besonderen Situation ergeben, jederzeit gegen die Verarbeitung der Sie betreffenden personenbezogenen Daten, die aufgrund von Art. 6 Abs. 1 lit. e oder f DSGVO erfolgt, Widerspruch einzulegen; dies gilt auch für ein auf diese Bestimmungen gestütztes Profiling. Generali verarbeitet die Sie betreffenden personenbezogenen Daten nicht mehr, es sei denn, sie kann zwingende schutzwürdige Gründe für die Verarbeitung nachweisen, die Ihre Interessen, Rechte und Freiheiten überwiegen, oder die Verarbeitung dient der Geltendmachung, Ausübung oder Verteidigung von Rechtsansprüchen.</p>
          <p>h) Recht auf Beschwerde bei einer Aufsichtsbehörde Sind Sie der Ansicht, dass wir Ihre Daten in nicht zulässiger Weise verwenden, so steht Ihnen das Recht auf Beschwerdeerhebung bei der Deutschland Datenschutzbehörde, Barichgasse 40-42, 1030 Wien, zu.</p>
          <p class="block">§ 10 Nutzungsrechte an den aufgenommenen Fotos</p>
          <p>(1) Generali ist berechtigt die aufgenommenen Fotos zu löschen, wenn hierdurch gegen diese Nutzungsbedingungen oder gegen geltendes Recht verstoßen wird.</p>
          <p>(2) Soweit Urheber- , Leistungsschutz-, Marken-, Persönlichkeits- oder sonstige Schutzrechte an den aufgenommenen Fotos bestehen, räumen Sie Generali zum Zeitpunkt ihres Entstehens sämtliche, zeitlich, räumlich und inhaltlich unbeschränkten Nutzungsrechte zu deren unbeschränkten Verwertung und Nutzung ein.</p>
          <p>(3) Generali ist berechtigt, die nach diesem Absatz 2 erworbenen Rechte Dritten nach freiem Ermessen vollständig oder teilweise, exklusiv oder nicht-exklusiv einzuräumen, abzutreten und/oder sie zu belasten, insbesondere ist eine Weitergabe an die Dienstleister der Generali zulässig.</p>
          <p>(4) Generali berücksichtigt die rechtlichen Anforderungen in Deutschland.</p>
          <p class="block">§ 11 Nebenabreden, Gerichtsstand, anwendbares Recht</p>
          <p>(1) Nebenabreden bedürfen der Schriftform.</p>
          <p>(2) Es gilt Deutschland Recht unter Ausschluss des UN-Kaufrechts. Für alle Streitigkeiten ist ausschließlicher Gerichtsstand das sachlich zuständige Gericht in München. Stand: 29.07.2020</p>
      privacy:
        title: Information zur Verwendung Ihrer Daten
        content: |
          <div><strong>Information zur Verwendung Ihrer Daten</strong></div>
          <br/>
          <div><strong>Verantwortlicher für die Datenverarbeitung</strong></div>
          <div>AXA Versicherung AG und AXA easy Versicherung AG</div>
          <div>Colonia-Allee 10-20</div>
          <div>51067 Köln</div>
          <div>Telefon: 0800 3203205</div>
          <div>E-Mail-Adresse: info@axa.de</div>
          <br/>
          <div><strong>Kontaktdaten des Datenschutzbeauftragten:</strong></div>
          <div>Unseren Datenschutzbeauftragten erreichen Sie per Post unter der o.g. Anschrift mit dem Zusatz – Datenschutzbeauftragter – oder per E-Mail unter datenschutz@axa.de.</div>
          <br/>
          <div><strong>Rechtsgrundlagen und Verwendungszwecke</strong></div>
          <div>Um Ihnen die Nutzung der Videobesichtigung/Foto App zu ermöglichen, erheben wir Ihre personenbezogenen Daten (Vor- und Nachname, E-Mail-Adresse, Mobilfunknummer, Schadennummer, Bilder vom Fahrzeugschein und Fahrzeug, Fahrzeug-Identifikationsnummer, Kennzeichen).</div>
          <br/>
          <div>Gemäß Art. 6 UAbs. 1 lit. a) Datenschutz-Grundverordnung (DSGVO) sind wir Verarbeitung Ihrer personenbezogenen Daten berechtigt, wenn Sie als betroffene Person in die Datenverarbeitung eingewilligt haben. Sie haben das Recht, Ihre Einwilligung jederzeit mit Wirkung für die Zukunft zu widerrufen. Durch den Widerruf wird die Rechtmäßigkeit der bis dahin auf Grundlage der Einwilligung erfolgten Verarbeitung nicht berührt. Ihren Widerruf richten Sie bitte an die oben angegebene Adresse. Im Falle des Widerrufs Ihrer Einwilligung ist die weitere Nutzung der App leider nicht möglich.</div>
          <br/>
          <div>Ihre Daten werden grundsätzlich nur zum Zweck der Schadenbearbeitung genutzt. Darüber hinaus kann es vorkommen, dass wir Ihre Daten zur Erstellung interner Analysen und Statistiken verarbeiten, wobei das Analyseergebnis und die Statistik selbst nur anonymisierte Daten beinhaltet. Rechtsgrundlage ist insoweit Art. 6 UAbs. 1 1 lit. f) DSGVO. Zudem verarbeiten wir Ihre personenbezogenen Daten zur Erfüllung gesetzlicher Verpflichtungen wie z. B. behördlicher Vorgaben sowie handels- und steuerrechtlicher Aufbewahrungspflichten. Rechtsgrundlage für die Verarbeitung ist in diesem Fall die jeweilige gesetzliche Regelung i. V. m. Art. 6 UAbs. 1 lit. c) DSGVO.</div>
          <div>Wenn Sie uns im Rahmen der Bearbeitung eines Vorgangs Ihre E-Mail- Adresse zur Kenntnis bringen, speichern wir diese und nutzen sie ggf. für die weitere Kommunikation zu dem betreffenden Vertrag oder Schaden, sofern Sie dieser Nutzung nicht widersprechen.</div>
          <br/>
          <div><strong>Empfänger und Kategorien von Empfängern</strong></div>
          <div>Ihre Daten werden nur an Dritte übermittelt, soweit dies zur Zweckerreichung erforderlich ist. Dabei handelt es sich insbesondere um das Unternehmen</div>
          <div><strong>MotionsCloud GmbH Atelierstr. 29 81671 München</strong></div>
          <div>und dessen Subdienstleister sowie die mit der Begutachtung des Schadens beauftragten Gutachter.</div>
          <div>Des Weiteren werden Ihre Daten zum Zwecke der Schadensbearbeitung durch die AXA Versicherung AG bzw. die AXA easy Versicherung AG und die mit ihr verbundenen Unternehmen verarbeitet. Weitere Informationen hierzu finden Sie unter www.axa.de/datenschutz.</div>
          <br/>
          <div><strong>Dauer der Datenverarbeitung und Löschung</strong></div>
          <div>Wir löschen Ihre personenbezogenen Daten, sobald sie für die oben genannten Zwecke nicht mehr erforderlich sind. Dabei kann es vorkommen, dass personenbezogene Daten für die Zeit aufbewahrt werden, in der Ansprüche gegen unser Unternehmen geltend gemacht werden können (gesetzliche Verjährungsfrist). Zudem speichern wir Ihre personenbezogenen Daten, solange wir dazu gesetzlich verpflichtet sind. Dies ergibt sich aus gesetzlichen Nachweis- und Aufbewahrungspflichten, die unter anderem im Handelsgesetzbuch, der Abgabenordnung und dem Geldwäschegesetz geregelt sind. Die Speicherfristen betragen danach bis zu zehn Jahre.</div>
          <br/>
          <div><strong>Ihre Rechte als betroffene Person</strong></div>
          <div>Sie können unter der o. g. Adresse Auskunft über die zu Ihrer Person gespeicherten Daten verlangen. Darüber hinaus können Sie unter bestimmten Voraussetzungen die Berichtigung oder die Löschung Ihrer Daten verlangen. Ihnen kann weiterhin ein Recht auf Einschränkung der Verarbeitung Ihrer Daten sowie ein Recht auf Herausgabe der von Ihnen bereitgestellten Daten in einem strukturierten, gängigen und maschinenlesbaren Format zustehen.</div>
          <br/>
          <div>Verarbeiten wir Ihre Daten auf Grundlage unserer berechtigten Interessen (Art. 6 UAbs. 1 lit. f) DSGVO), können Sie dieser Verarbeitung widersprechen, wenn sich aus Ihrer besonderen Situation Gründe ergeben, die gegen die Datenverarbeitung sprechen. Ihren Widerspruch richten Sie bitte unter Angabe der Gründe an datenschutz@axa.de.</div>
          <br/>
          <div><strong>Beschwerderecht</strong></div>
          <div>Sie haben das Recht, sich mit einer Beschwerde an den oben genannten Datenschutzbeauftragten oder an eine Datenschutzaufsichtsbehörde zu wenden.</div>
          <div>Die für uns zuständige Datenschutzaufsichtsbehörde ist</div>
          <br/>
          <div>Landesbeauftragte für Datenschutz und Informationsfreiheit Nordrhein-Westfalen</div>
          <div>Kavalleriestraße 2 -4</div>
          <div>40213 Düsseldorf</div>
