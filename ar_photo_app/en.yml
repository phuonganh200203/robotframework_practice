      term_conditions:
        title: Terms and Conditions
        content: |
          <h1>Terms and Conditions</h1>
          <p>Terms of Use for the "Photo App" program of the company&nbsp;%{claimant_name}</p>
          <p><strong>Introduction&nbsp;</strong>To use this program, you must agree to these Terms of Use.</p>
          <p><strong>&sect; 1</strong> Scope of Application Use of the "Photo App" program (hereinafter: "Program") offered by&nbsp;%{claimant_name},&nbsp;%{claimant_street}&nbsp;%{claimant_house_number},&nbsp;%{claimant_postcode}&nbsp;%{claimant_city}&nbsp;("Company") is permitted solely on the basis of these conditions. By clicking the link in the SMS sent to you, you accept the validity of these Terms of Use in their respective versions.</p>
          <p><strong>&sect; 2</strong> Subject Matter of the Contract (1) The Program is launched via web services. (2) The Company is entitled to discontinue the operation of the Program in whole or in part at any time. Due to the nature of the Internet, mobile networks, and computer systems, the Company assumes no warranty for the uninterrupted availability or functionality of the Program. (3) These Terms of Use solely govern the use of the Program. (4) The Program enables you to take photos of the damage situation and upload them for the Company's claim file. For these purposes, the Company also processes personal data.</p>
          <p><strong>&sect; 3</strong> Technical Requirements for Mobile Devices for Using the Program A prerequisite for using the Program is an existing internet connection. The amount of any costs incurred for usage depends on the relevant provisions of the user's mobile tariff. The use of an internet connection via a local wireless network (Wi-Fi) may incur costs.</p>
          <p><strong>&sect; 4</strong> Access The Company is entitled to revoke access authorization at any time without giving reasons. This applies in particular if you have violated these terms or applicable law when using the Program. Access authorization expires upon the closing of the Photo App session or after the expiration of a specified period of time.</p>
          <p><strong>&sect; 5</strong> Functionalities of the Program After successful activation, you can take photos using your mobile phone camera and transmit them directly into the claim file. For further claim processing, the transmitted photos and the geocoding of the damage location will be recorded.</p>
          <p><strong>&sect; 6</strong> Your Duties When using the Program, you must not transmit content containing viruses, so-called Trojan horses, or other programming that could damage software.</p>
          <p><strong>&sect; 7</strong> Duration of Use The term of this agreement on the use of the Program begins with your consent to these Terms of Use and ends with the termination of the Photo App session or after the expiration of a specified period of time. The right to extraordinary termination of this usage agreement for good cause remains unaffected.</p>
          <p><strong>&sect; 8</strong> Other Liability and Damages (1) The Company is liable only in accordance with the following provisions in (a) to (c): (a) The Company shall be liable without limitation for damages caused intentionally or by gross negligence by the Company, its legal representatives, or vicarious agents. (b) The Company shall be liable without limitation for damages resulting from injury to life, body, or health caused intentionally or negligently by the Company, its legal representatives, or vicarious agents. (c) The Company shall be liable for damages resulting from the breach of cardinal obligations by the Company, its legal representatives, or vicarious agents; cardinal obligations are the material obligations that form the basis of the contract, which were decisive for the conclusion of the contract, and on the fulfillment of which the user was entitled to rely. If the Company has breached these cardinal obligations through slight negligence, its liability is limited to the amount that was foreseeable for the Company at the time of the respective service. (2) Any further liability of the Company is excluded on the merits. (3) The above regulation is not associated with a shift in the burden of proof to your disadvantage.</p>
          <p><strong>&sect; 9 </strong>Notes on Data Processing 9.1 Type of Personal Data: The following data is stored by us: First name, last name, e-mail address or mobile number, claim number, as well as your GPS geocoding at the time the photo was taken. 9.2 Storage Location/Deletion of Data: The Company stores your personal data only as long as is necessary to achieve the purpose for which it was collected and providing there are no other legal or contractual requirements (such as retention periods) for longer storage. 9.3 Purpose-Bound Use: The Company will process the personal data provided by you solely for the purpose of claim processing. Should personal data be processed beyond the statutory processing possibilities, this will only be done with your express consent. Processing of personal data and its transmission to authorized state institutions and authorities only take place within the framework of relevant laws or if we are obliged to do so by a court decision. The Company's employees and the service companies commissioned by it are obliged to maintain confidentiality and to comply with European and national data protection standards. 9.4 Security: The Company has taken technical and organizational security measures to protect your personal data against loss, destruction, manipulation, and unauthorized access. All employees of the Company are obliged to comply with European and national data protection standards and to handle personal data confidentially. In the event of the collection and processing of personal data, the information is transmitted in SSL-encrypted form to prevent misuse of the data by third parties. The Company's security measures are continuously revised in accordance with technological developments. 9.5 Your Rights as a Data Subject: If personal data concerning you is processed, you are a data subject within the meaning of the GDPR and you have the following rights against the Company: a) Right of access (Art. 15 GDPR) b) Right to rectification (Art. 16 GDPR) c) Right to restriction of processing (Art. 18 GDPR) d) Right to erasure (Art. 17 GDPR) e) Right to notification (Art. 19 GDPR) f) Right to data portability (Art. 20 GDPR) g) Right to object (Art. 21 GDPR) h) Right to withdraw the data protection declaration of consent i) Right to lodge a complaint with a supervisory authority (Art. 77 GDPR). The data protection supervisory authority responsible for the Company is: Bayerisches Landesamt f&uuml;r Datenschutzaufsicht, Postfach 606, 91511 Ansbach. The supervisory authority with which the complaint has been lodged shall inform the complainant on the progress and the outcome of the complaint including the possibility of a judicial remedy pursuant to Art. 78 GDPR.</p>
          <p><strong>&sect; 10</strong> Rights of Use Regarding the Captured Photos (1) The Company is entitled to delete the captured photos if this violates these Terms of Use or applicable law. (2) Insofar as copyright, ancillary copyright, trademark, personality, or other intellectual property rights exist in the captured photos, you grant the Company, at the time of their creation, all exclusive rights of use, unlimited in time, space, and content, for their unrestricted exploitation and use. (3) The Company is entitled to grant, assign, and/or encumber the rights acquired under this paragraph 2 to third parties in whole or in part, exclusively or non-exclusively, at its own discretion; in particular, passing them on to the Company's service providers is permitted. (4) The Company takes into account the legal requirements in Germany.</p>
          <p><strong>&sect; 11</strong> Side Agreements, Place of Jurisdiction, Applicable Law (1) Side agreements must be in writing. (2) If you are a merchant within the meaning of the German Commercial Code (HGB), the exclusive place of jurisdiction is&nbsp;%{claimant_city}. (3) German law applies, excluding the UN Convention on Contracts for the International Sale of Goods (CISG).</p>
          <p><strong data-path-to-node="21" data-index-in-node="0">Status: March 12, 2026</strong></p>
      privacy:
        title: Information on the Use of Your Data
        content: |
          <div><strong>Information on the Use of Your Data</strong></div>
          <br/>
          <div><strong>Controller Responsible for Data Processing</strong></div>
          <div>ABC Company</div>
          <div>Street A 20</div>
          <div>00110 City</div>
          <div>country</div>
          <div>Phone: 0800 000 000</div>
          <div>Email: info@ABC.company</div>
          <br/>
          <div><strong>Contact Details of the Data Protection Officer</strong></div>
          <div>You can reach our Data Protection Officer by post at the address above, adding “Data Protection Officer” to the address, or by email at data@ABC.company.</div>
          <br/>
          <div><strong>Legal Bases and Purposes of Processing</strong></div>
          <div>To enable you to use the video inspection/photo app, we collect your personal data (first and last name, email address, mobile phone number, claim number, images of the vehicle registration document and the vehicle, vehicle identification number (VIN), and license plate number).</div>
          <br/>
          <div>Pursuant to Art. 6(1)(a) of the General Data Protection Regulation (GDPR), we are permitted to process your personal data if you, as the data subject, have given your consent. You have the right to withdraw your consent at any time with effect for the future. Withdrawal does not affect the lawfulness of processing carried out on the basis of your consent up to that point. Please send your withdrawal to the address stated above. If you withdraw your consent, continued use of the app is unfortunately not possible.</div>
          <br/>
          <div>Your data is generally used solely for the purpose of handling your claim. In addition, we may process your data to create internal analyses and statistics; however, the analysis results and statistics contain only anonymized data. The legal basis for this is Art. 6(1)(f) GDPR. We also process your personal data to comply with legal obligations, such as regulatory requirements and commercial and tax retention obligations. The legal basis in this case is the applicable statutory provision in conjunction with Art. 6(1)(c) GDPR.</div>
          <div>If, in the course of handling a case, you provide us with your email address, we will store it and may use it for further communication regarding the relevant policy or claim, unless you object to such use.</div>
          <br/>
          <div><strong>Recipients and Categories of Recipients</strong></div>
          <div>Your data will only be transferred to third parties to the extent necessary to achieve the stated purposes. This includes, in particular, the company</div>
          <div><strong>MotionsCloud GmbH</strong></div>
          <div>as well as its sub-processors and the experts appointed to assess the claim.</div>
          <div>Furthermore, for the purpose of claim handling, your data will be processed by ABC company and companies affiliated with them. Further information can be found at www.abc.company.</div>
          <br/>
          <div><strong>Duration of Processing and Deletion</strong></div>
          <div>We delete your personal data as soon as it is no longer required for the purposes stated above. In some cases, personal data may be retained for the period during which claims can be asserted against our company (statutory limitation periods). In addition, we store your personal data for as long as we are legally obliged to do so. This follows from statutory documentation and retention obligations, including those set out in the German Commercial Code (HGB), the Fiscal Code (AO), and the Money Laundering Act (GwG). Retention periods can be up to ten years.</div>
          <br/>
          <div><strong>Your Rights as a Data Subject</strong></div>
          <div>You may request information from the address stated above about the data stored about you. In addition, under certain conditions, you may request the correction or deletion of your data. You may also have the right to restriction of processing and the right to receive the data you provided in a structured, commonly used, and machine-readable format.</div>
          <br/>
          <div>If we process your data on the basis of our legitimate interests (Art. 6(1)(f) GDPR), you may object to this processing if there are reasons arising from your particular situation that speak against the processing. Please send your objection, stating your reasons, to datenschutz@axa.de.</div>
          <br/>
          <div><strong>Right to Lodge a Complaint</strong></div>
          <div>You have the right to lodge a complaint with the Data Protection Officer named above or with a data protection supervisory authority.</div>
          <div>The supervisory authority responsible for us is:</div>
          <br/>
          <div>State Commissioner for Data Protection and Freedom of Information of City</div>
          <div>Street name 1</div>
          <div>00100 city</div>
          <div>Country</div>
