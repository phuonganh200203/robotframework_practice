    photo_app_term_and_condition_body: |
      <h1 class="text-center m-b-30">Video inspection terms and conditions</h1>
      <p class="text-align-justify">If you use this platform to send in your case, you agree to the following:</p>
      <p class="text-align-justify m-b-30">All photos, location data and comments that are uploaded to this platform are the object of THE COMPANY and its subsidiaries and sister companies ("MotionsCloud"), the developer of this platform. All video / voice chats that occur on this platform are recorded and are also the object of %{insurer_name} and MotionsCloud. %{insurer_name} will keep the videos, photos, comments or other information (shared information) as part of its damage data and MotionsCloud will keep shared information for research and development. %{insurer_name} and MotionsCloud count the shared information as their declaration of consent. All shared information provided by the damage process will be used as evidence, according to the evidence, in a case of litigation.</p>
