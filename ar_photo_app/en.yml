    help_modal:
      vin_number_title: "What does VIN number mean and where can I find it?"
      vin_number_content_1: The vehicle identification number is a unique code that is assigned to each vehicle during manufacture. The VIN number is a 17-digit combination of letters and numbers.
      vin_number_content_2: "The VIN number can be found in the following places, depending on the vehicle:"
      vin_number_content_3: In the admission
      vin_number_content_4: as well as on the vehicle
      vin_number_content_5: 1. on the windshield on the left in the direction of travel
      vin_number_content_6: 2. on the left and right door frames
      vin_number_content_7: 3. In the engine compartment
