en:
  ar_photo_app_v2:
    claim: Claim
    page_step: Step %{page} From %{pages}
    provide_details: Details
    damage_report_submitted: Your damage report has been submitted.
    get_back_within_business_days: Thank you
    insurance_number: Insurance number
    what_damage_injury_has_occurred: "What damage/injury has occurred?"
    has_additional_third_party_damage: Has there been additional third-party damage?
    avis_vehicle_detail: AVIS vehicle
    opponent_vehicle_detail: Enemy vehicle details
    signature_title: Sign and submit
    signed_date_title: Signed Date
    signed_location_title: Signed Location
    signature_pdf_title: Signature
    confirm_completed: I hereby confirm the completeness and accuracy of the information I have provided.
    send_a_copy_to_my_email: Send a copy to my email address
    please_provide_details_of_the_avis_vehicle: Please provide details of the AVIS vehicle.
    please_provide_details_of_the_opponent_vehicle: Please provide details of the opponent's vehicle.
    vehicle_damage_title: AVIS vehicle
    vehicle_damage_description: Please provide details of the AVIS vehicle.
    vehicle_number_of_damage_title: Enemy vehicle details
    vehicle_number_of_damage_description: Please provide details of the opponent's vehicle.
    insurance_number: Insurance number
    insurance_phone: Phone
    insurance_email: E-Mail
    vehicle_damages:
      damage_to_the_avis_vehicle: Damage to the AVIS vehicle
      injury_to_a_person: Injury to a person
      damage_to_an_object: Damage to an item
    vehicle_number_of_damages:
      third_party_damage_to_another_vehicle: Third-party damage to another vehicle
      external_damage_to_several_vehicle: External damage to several vehicles
      no_vehicle_damage: No vehicle damage
    custom_claim_pages:
      page0:
        name: General information about the damage
        code: 'claim'
        display_order: 0
        fields:
          field1:
            field_label: Wann ist der Schaden passiert?
            field_name: accident_date
            field_type: date
            required: "true"
          field2:
            field_label: Wie lautet das Kennzeichen des AVIS-Fahrzeugs?
            field_name: registration_number
            field_type: text
            required: "true"
          field3:
            field_label: Wie lautet Ihre Mietvertragsnummer?
            field_name: rental_agreement_number
            field_type: text
            placeholder: Diese ist auf dem Mietvertrag zu finden
      page1:
        name: 'Unfalldetails'
        code: 'claim_group'
        display_order: 1
        fields:
          field1:
            field_type: radio
            field_label: Was ist passiert?
            field_name: happened
            field_options:
              option1:
                name: accident
                label: Unfall
                hint: "z.B. Park oder Verkehrsunfall / Wildunfall"
              option2:
                name: damage
                label: Sachschaden
                hint: "Glas, Tierbiss, Vandalismus, Unwetter, Panne, Brand oder Kurzschluss, Diebstahl"
          field2:
            field_label: Daten des Fahrzeugs
            field_type: group_field
            group_fields:
              field1:
                field_name: vehicle_ra_number
                field_type: text
                placeholder: RA-Nummer
              field2:
                field_name: vehicle_manufacturer
                field_type: text
                placeholder: Kennzeichen
              field3:
                field_name: vehicle_type
                field_type: text
                placeholder: Marke/Typ
          field3:
            field_name: accident_date
            field_label: Wann ist der Schaden passiert?
            field_type: datetime
          field4:
            field_label: Wo ist der Schaden passiert?
            field_type: group_field
            field_name: accident_place_information
            group_fields:
              field1:
                field_name: accident_place
                field_type: text
                placeholder: PLZ
              field2:
                field_name: accident_place_other
                field_type: text
          field5:
            field_label: Wie ist es zum Unfall gekommen?
            field_name: accident_happen
            field_type: radio
            field_options:
              option1:
                name: parking
                label: Beim Parken
              option2:
                name: rear_end_collision
                label: Auffahrunfall
              option3:
                name: turning
                label: Beim Abbiegen
              option4:
                label: Vorfahrtsverletzung
              option5:
                name: right_of_way_infringement
                label: Beim Spurwechsel
              option6:
                name: other
                label: Sonstiges
          field9:
            field_label: Bitte schildern Sie uns den Unfallhergang in Ihren Worten
            placeholder: Skizze anfertigen
            field_name: damage_description
            field_type: textarea
          field10:
            field_label: Eine Skizze des Unfalls anfertigen
            field_hint: Edit sketch
            field_type: ar_draw
            field_name: ar_draw
      page2:
        name: 'AVIS Fahrzeugdetails'
        code: 'claim_avis'
        display_order: 2
        fields:
          field1:
            field_label: Wer ist das AVIS-Fahrzeug zum Schadenzeitpunkt gefahren?
            field_type: group_field
            field_name: claimant_information
            group_fields:
              field1:
                field_type: text
                field_name: claimant_firstname
                placeholder: Name
              field2:
                field_type: text
                field_name: claimant_lastname
                placeholder: Vorname
              field3:
                field_type: text
                field_name: claimant_address
                placeholder: Anschrift
              field4:
                field_type: text
                field_name: claimant_email
                placeholder: E-Mail
                field_input_type: email
              field5:
                field_type: text
                field_name: claimant_phone
                placeholder: Telefon
          field2:
            field_type: boolean
            field_label: Hatte der AVIS-Fahrer einen gültigen Führerschein?
            field_name: avis_driver_valid_license
          field3:
            field_type: boolean
            field_label: Stand der AVIS-Fahrer während der Fahrt unter dem Einfluss von Alkohol, Drogen oder Medikamenten?
            field_name: avis_driver_drunk
          field4:
            field_type: boolean
            field_label: Hat sich der AVIS-Fahrer unerlaubt vom Unfallort entfernt?
            field_name: avis_driver_leave_without_permit
          field5:
            field_type: checkbox
            field_label: Wer hat nach Ihrer Einschätzung den Schaden verursacht?
            field_name: accident_guess
            field_options:
              option1:
                name: myself
                label: Ich selbst
              option2:
                name: feind
                label: Unfallgegner
              option3:
                name: other_person
                label: Eine andere Person
              option4:
                name: animal
                label: Ein Tier
          field6:
            field_label: Wurde der Schaden polizeilich aufgenommen?
            field_type: group_field
            field_name: recorded_information
            group_fields:
              field1:
                field_name: recorded_by_the_police
                field_type: boolean
              field2:
                field_name: recorded_receiving_office
                field_type: text
                placeholder: Aufnehmende Dienststelle
              field3:
                field_name: recorded_file_number
                field_type: text
                placeholder: Aktenzeichen
          field7:
            field_label: Gibt es Zeugen?
            field_type: group_field
            field_name: accident_witnesses_information
            group_fields:
              field1:
                field_name: accident_witnesses
                field_type: boolean
              field2:
                field_name: accident_witnesses_name
                field_type: text
                placeholder: Name
              field3:
                field_name: accident_witnesses_address
                field_type: text
                placeholder: Anschrift
      page3:
        name: Wo wurde das AVIS-Fahrzeug beschädigt?
        tips: Tippen Sie auf die Felder zum Erstellen von Fotos
        code: claim_photo_app
        fields:
          field1:
            field_label: AR Photo
            field_name: ar_photo_car_part
            field_type: ar_photo_car_part
      page4:
        name: Gegnerische Fahrzeugdetails
        code: claim_member
        display_order: 3
        fields:
          field1:
            field_label: Was fuhr der Unfallgegner für ein Fahrzeug?
            field_name: involved_vehicle
            field_type: radio
            field_options:
              option1:
                name: pkv
                label: PKW
              option2:
                name: light_motorcycle_trailer
                label: Leichtkraftrad / Kraftrad / Anhänger
              option3:
                name: other_vehicle
                label: Sonstiges Fahrzeug
          field2:
            field_name: involved_vehicle_mark
            field_label: Kennzeichen
            field_type: text
          field3:
            field_label: Angaben zum Fahrer des gegnerischen Fahrzeugs
            field_type: group_field
            field_name: driver_information
            group_fields:
              field1:
                field_type: text
                field_name: driver_name
                placeholder: Name
              field2:
                field_type: text
                field_name: driver_address
                placeholder: Anschrift
              field3:
                field_type: text
                field_name: driver_phone
                placeholder: Telefon
              field4:
                field_type: text
                field_name: driver_email
                placeholder: E-Mail
                field_input_type: email
          field4:
            field_label: Ist dies auch der Halter des Fahrzeugs?
            field_name: driver_is_owner_of_vehicle
            field_type: boolean
          field5:
            field_label: Geben Sie bitte dann Daten des Halters an
            field_type: group_field
            field_name: claimant_member_information
            group_fields:
              field1:
                field_type: text
                field_name: claimant_name
                placeholder: Name
              field2:
                field_type: text
                field_name: claimant_address
                placeholder: Anschrift
              field3:
                field_type: text
                field_name: claimant_phone
                placeholder: Telefon
              field4:
                field_type: text
                field_name: claimant_email
                field_input_type: email
                placeholder: E-Mail
              field5:
                field_type: text
                field_name: claimant_phone
                placeholder: Telefon
          field6:
            field_label: Bei welcher Versicherung ist das Fahrzeug des Unfallgegners versichert?
            field_name: involved_vehicle_insurance
            field_type: group_field
            group_fields:
              field1:
                field_name: involved_vehicle_insurance_name
                field_type: text
                placeholder: Gesellschaft
              field2:
                field_name: involved_vehicle_insurance_number
                field_type: text
                placeholder: Vertragsnummer
          field7:
            field_label: Hatte das Fahrzeug des Unfallgegners zum Zeitpunkt des Unfalls unreparierte Vorschäden?
            field_name: involved_vehicle_unrepaired_previous
            field_type: radio
            field_input_type: button
            field_options:
              option1:
                name: "yes"
                label: Ja
              option2:
                name: "no"
                label: NEIN
              option3:
                name: not_know
                label: Nicht bekannt
      page5:
        name: Details zum beschädigten Objekt
        code: claim_object
        display_order: 4
        fields:
          field1:
            field_label: Welche Gegenstände wurden beschädigt/berührt?
            field_type: checkbox
            field_name: object_damage
            field_options:
              option1:
                name: buildings_and_parts_thereof
                label: Gebäude und deren Teile
              option2:
                name: movable_objects_such_as_bicycles
                label: "Bewegliche Gegenstände wie z.B. Fahrrad"
              option3:
                name: street_facilities
                label: "Straßeneinrichtungen (z.B. Leitplanken, Schilder, Ampeln etc.)"
              option4:
                name: trees_plants_and_plants
                label: "Bäume, Gewächse und Pflanzen"
              option5:
                name: fences
                label: "Zäune"
              option6:
                name: animals
                label: "Tiere"
              option7:
                name: train_tram_barrierat_the_level_crossing
                label: "Zug, Straßenbahn, Schranke am Bahnübergang"
              option8:
                name: other
                label: "Sonstiges"
          field2:
            field_label: Haben die Eigentümer Kenntnis über den Schaden erhalten?
            field_type: boolean
            field_name: owners_informed
          field3:
            field_label: Haben Sie Fotos an der Unfallstelle gemacht?
            field_type: boolean
            field_name: take_photos_accident
          field4:
            field_label: AR Photo Additional
            field_type: ar_photo_additional
            field_name: ar_photo_additional
